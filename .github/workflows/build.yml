name: Build Tweak
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget

      - name: Setup full Theos (with toolchain)
        run: |
          # 下载带工具链的完整 Theos 包，跳过 git clone
          wget -O theos.tar.gz https://github.com/opa334/theos/archive/refs/heads/master.tar.gz
          mkdir -p $HOME/theos
          tar -xzf theos.tar.gz --strip-components=1 -C $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
          # 创建 SDK 占位文件，骗过 Theos 检测
          mkdir -p $HOME/theos/sdks
          touch $HOME/theos/sdks/iPhoneOS15.0.sdk

      - name: Build package
        run: make package
