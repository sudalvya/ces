name: Build Tweak
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl libssl-dev clang llvm

      - name: Setup Theos (纯官方、零外部下载)
        run: |
          # 用官方镜像完整克隆Theos（含子模块）
          git clone --depth 1 --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV

          # 创建SDK占位，跳过所有下载
          mkdir -p $HOME/theos/sdks
          touch $HOME/theos/sdks/iPhoneOS15.0.sdk

          # 关键：强制使用系统clang作为编译器，绕开Theos自带工具链缺失问题
          echo "export CC=clang" >> $GITHUB_ENV
          echo "export CXX=clang++" >> $GITHUB_ENV

      - name: Build package
        run: make package
