name: Build Tweak<br/>on: [push]<br/><br/>jobs:<br/>  build:<br/>    runs-on: ubuntu-latest<br/>    steps:<br/>      - uses: actions/checkout@v4<br/>      - name: Install Theos<br/>        run: |<br/>          git clone --recursive https://github.com/theos/theos.git ~/theos<br/>          echo "THEOS=$HOME/theos" >> $GITHUB_ENV<br/>      - name: Build Tweak<br/>        run: |<br/>          make package<br/>      - name: Upload deb<br/>        uses: actions/upload-artifact@v4<br/>        with:<br/>          name: helper_patch<br/>          path: ./packages/*.deb
