name: Build Tweak
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Setup Theos (跳过SDK下载)
        run: |
          git clone --depth 1 --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
          # 手动创建SDK目录占位，让Theos误以为有SDK
          mkdir -p $HOME/theos/sdks
          touch $HOME/theos/sdks/iPhoneOS15.0.sdk

      - name: Build package
        run: make package
