name: Build
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Full Theos Env + SDK
        run: |
          sudo apt update -y
          sudo apt install git build-essential perl wget tar -y
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo THEOS=$HOME/theos >> $GITHUB_ENV
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          wget -O iPhoneOS15.0.sdk.tar.xz https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz
          tar -xf iPhoneOS15.0.sdk.tar.xz
          rm iPhoneOS15.0.sdk.tar.xz

      - name: Compile
        run: make clean && make package

      - name: Get Deb
        uses: actions/upload-artifact@v4
        with:
          path: packages/*.deb
