- name: Full Theos Env + SDK
  run: |
    sudo apt update -y
    sudo apt install git build-essential perl wget tar -y
    git clone --recursive https://github.com/theos/theos.git $HOME/theos
    echo THEOS=$HOME/theos >> $GITHUB_ENV
    mkdir -p $HOME/theos/sdks
    cd $HOME/theos/sdks
    
    # 尝试多个SDK源
    SDK_URL="https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz"
    
    if wget --spider "$SDK_URL" 2>/dev/null; then
      wget -O iPhoneOS15.0.sdk.tar.xz "$SDK_URL"
    else
      echo "Warning: Primary SDK source unavailable. Please provide an alternative SDK source."
      exit 1
    fi
    
    tar -xf iPhoneOS15.0.sdk.tar.xz
    rm iPhoneOS15.0.sdk.tar.xz
