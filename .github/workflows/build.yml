name: Build Tweak
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl libssl-dev

      - name: Setup Theos
        run: |
          # 快速安装 Theos（depth 1 减少下载量）
          git clone --depth 1 --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
          # 下载 iOS 15.0 SDK（Theos 编译必需）
          curl -LO https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz
          mkdir -p $HOME/theos/sdks
          tar -xf iPhoneOS15.0.sdk.tar.xz -C $HOME/theos/sdks/

      - name: Build package
        run: make package
