name: Build Tweak
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget perl

      - name: Setup Theos (full with dm.pl)
        run: |
          # 用官方仓库克隆，确保dm.pl完整
          git clone --depth 1 --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
          # 创建SDK占位文件
          mkdir -p $HOME/theos/sdks
          touch $HOME/theos/sdks/iPhoneOS15.0.sdk

      - name: Build package
        run: make package
