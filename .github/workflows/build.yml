name: Build Tweak
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl libssl-dev

      - name: Setup Theos
        run: |
          # 安装Theos并设置路径
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV
          # 安装iOS SDK（可选，解决部分构建问题）
          curl -LO https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz
          mkdir -p $HOME/theos/sdks
          tar -xf iPhoneOS15.0.sdk.tar.xz -C $HOME/theos/sdks/

      - name: Build package
        run: make package
