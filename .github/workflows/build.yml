- name: Full Theos Env + SDK
  shell: bash
  run: |
    set -euo pipefail
    sudo apt update -y
    sudo apt install -y git build-essential perl curl tar xz-utils ca-certificates

    git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
    echo THEOS=$HOME/theos >> $GITHUB_ENV

    mkdir -p "$HOME/theos/sdks"
    cd "$HOME/theos/sdks"

    # Local fallback path inside repository (optional)
    LOCAL_PATH="${GITHUB_WORKSPACE:-$(pwd)}/.github/sdks/iPhoneOS15.0.sdk.tar.xz"

    # Determine SDK_URL: prefer workflow_dispatch input if provided
    SDK_URL="${{ github.event.inputs.sdk_url }}"
    if [ -z "$SDK_URL" ]; then
      SDK_URL="https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz"
    fi
    echo "Configured SDK_URL: $SDK_URL"
