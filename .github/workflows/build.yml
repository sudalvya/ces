name: Build
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Full Theos Env + Multi-Source SDK
        run: |
          sudo apt update -y
          sudo apt install git build-essential perl wget tar -y
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo THEOS=$HOME/theos >> $GITHUB_ENV
          mkdir -p $HOME/theos/sdks
          cd $HOME/theos/sdks
          
          # 尝试第一个源
          if ! wget -q --spider https://github.com/luis200412/iOS-SDKs/releases/download/15.0/iPhoneOS15.0.sdk.tar.xz; then
            # 第一个失败，尝试第二个源
            if ! wget -q --spider https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz; then
              # 第二个失败，尝试第三个源
              wget -O iPhoneOS15.0.sdk.tar.xz https://github.com/RetOv/iOS-SDKs/releases/download/15.0/iPhoneOS15.0.sdk.tar.xz
            else
              wget -O iPhoneOS15.0.sdk.tar.xz https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz
            fi
          else
            wget -O iPhoneOS15.0.sdk.tar.xz https://github.com/luis200412/iOS-SDKs/releases/download/15.0/iPhoneOS15.0.sdk.tar.xz
          fi
          
          tar -xf iPhoneOS15.0.sdk.tar.xz
          rm iPhoneOS15.0.sdk.tar.xz

      - name: Compile
        run: make clean && make package

      - name: Get Deb
        uses: actions/upload-artifact@v4
        with:
          path: packages/*.deb
