name: Build Tweak
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl libssl-dev clang llvm wget tar

      - name: Setup Theos + SDK + Toolchain
        run: |
          export THEOS=$HOME/theos
          # 1. 克隆完整Theos
          git clone --depth 1 --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$THEOS/makefiles" >> $GITHUB_ENV

          # 2. 下载并安装iOS SDK
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          wget -O iPhoneOS15.0.sdk.tar.xz https://github.com/xybp888/iOS-SDKs/releases/download/1.0/iPhoneOS15.0.sdk.tar.xz
          tar -xf iPhoneOS15.0.sdk.tar.xz
          rm iPhoneOS15.0.sdk.tar.xz

          # 3. 下载并安装完整Linux工具链
          mkdir -p $THEOS/toolchain/linux/iphone
          cd $THEOS/toolchain/linux/iphone
          wget -O toolchain.tar.xz https://github.com/xybp888/ios-toolchain/releases/download/1.0/ios-toolchain-linux-x86_64.tar.xz
          tar -xf toolchain.tar.xz --strip-components=1
          rm toolchain.tar.xz

      - name: Build package
        run: make package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: ./packages/*.deb
