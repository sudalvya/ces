name: Build Tweak
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发！关键配置

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl libssl-dev curl

      - name: Setup Theos (official method)
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$THEOS/makefiles" >> $GITHUB_ENV
          cd $THEOS
          ./bin/theos-install-sdk.sh 15.0

      - name: Build package
        run: make package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: ./packages/*.deb
