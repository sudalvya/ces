name: Build Tweak<br/>on:<br/>  push:<br/>    branches:<br/>      - main<br/><br/>jobs:<br/>  build:<br/>    runs-on: ubuntu-latest<br/>    steps:<br/>      - name: Checkout code<br/>        uses: actions/checkout@v4<br/><br/>      - name: Install Theos<br/>        run: |<br/>          git clone --recursive https://github.com/theos/theos.git ~/theos<br/>          echo "THEOS=$HOME/theos" >> $GITHUB_ENV<br/><br/>      - name: Build package<br/>        run: |<br/>          make package<br/><br/>      - name: Upload artifact<br/>        uses: actions/upload-artifact@v4<br/>        with:<br/>          name: helper_patch<br/>          path: packages/*.deb
